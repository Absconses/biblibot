<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #faf6f0 0%, #f0e8da 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; transition: background .3s, color .3s; }
  #app { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 14px; }
  header { display: flex; align-items: center; gap: 14px; padding: 8px 0; }
  .logo { width: 52px; height: 52px; background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; box-shadow: 0 3px 12px rgba(139, 69, 19, 0.25); }
  h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.5rem; font-weight: 700; color: #4a2c17; letter-spacing: -0.01em; }
  .sub { font-size: 0.85rem; color: #8b7355; margin-top: 2px; }
  .hdr-actions { margin-left: auto; display: flex; gap: 6px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d4c4a8; background: #fffcf7; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .icon-btn:hover { transform: translateY(-1px); background: #f5ead6; }
  #chat { background: #fffcf7; border-radius: 18px; border: 1px solid #e8dcc8; min-height: 380px; max-height: 500px; overflow-y: auto; padding: 1.2rem; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; box-shadow: 0 2px 16px rgba(139, 69, 19, 0.06); transition: background .3s, border-color .3s; }
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeSlide .4s ease-out; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .av { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .av.bot { background: linear-gradient(135deg, #8b4513, #a0522d); }
  .av.usr { background: linear-gradient(135deg, #2d5a3e, #3a7a5a); }
  .bub { max-width: 82%; padding: 11px 15px; font-size: 14px; line-height: 1.7; border-radius: 18px; }
  .msg.bot .bub { background: #f5f0e6; color: #3a2a1a; border-radius: 4px 18px 18px 18px; border: 1px solid #e8dcc8; }
  .msg.user .bub { background: linear-gradient(135deg, #2d5a3e, #3a7a5a); color: #e8f4ee; border-radius: 18px 4px 18px 18px; box-shadow: 0 2px 8px rgba(45, 90, 62, 0.2); }
  .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
  .typing span { width: 7px; height: 7px; background: #b08968; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  .typing-text { font-size: 12px; color: #8b7355; font-style: italic; margin-left: 6px; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  #quick { display: flex; gap: 8px; flex-wrap: wrap; }
  .qb { font-size: 12.5px; padding: 6px 15px; border-radius: 22px; border: 1px solid; cursor: pointer; transition: all .2s; font-weight: 600; }
  .qb:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .qb-aventure { background: #fff3e0; color: #e65100; border-color: #ffb74d; }
  .qb-enquete { background: #fce4ec; color: #c62828; border-color: #ef9a9a; }
  .qb-fantastique { background: #263238; color: #eceff1; border-color: #546e7a; }
  .qb-fantasy { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
  .qb-sf { background: #eceff1; color: #455a64; border-color: #b0bec5; }
  .qb-societe { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
  .qb-humour { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .qb-mythe { background: #fffde7; color: #f57f17; border-color: #fff176; }
  .qb-neutre { background: #fffcf7; color: #6b4c30; border-color: #d4c4a8; }
  .qb-classique { background: #efebe9; color: #4e342e; border-color: #bcaaa4; }
  .covers { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e8dcc8; }
  .cover-card { text-align: center; max-width: 90px; }
  .cover-card img { width: 80px; height: 115px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform .2s; }
  .cover-card img:hover { transform: scale(1.08); }
  .cover-card p { font-size: 10px; margin-top: 4px; color: #6b4c30; line-height: 1.2; word-break: break-word; }
  #irow { display: flex; gap: 8px; }
  #inp { flex: 1; font-size: 14px; border-radius: 14px; border: 1px solid #d4c4a8; padding: 11px 16px; background: #fffcf7; color: #3a2a1a; outline: none; transition: border-color .2s, background .3s; }
  #inp:focus { border-color: #8b4513; box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1); }
  #inp::placeholder { color: #b8a080; }
  #sbtn { padding: 11px 22px; border-radius: 14px; border: none; background: linear-gradient(135deg, #8b4513, #a0522d); color: #fff8f0; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: 0 2px 8px rgba(139, 69, 19, 0.25); }

  body.dark .sub { color: #9a8a70; }

  body.dark #inp { background: #2a2a3e; border-color: #3a3a50; color: #e0d5c5; }
  body.dark #inp::placeholder { color: #6a6a80; }
  body.dark .icon-btn { background: #2a2a3e; border-color: #3a3a50; color: #e0d5c5; }
  body.dark .icon-btn:hover { background: #3a3a50; }
  body.dark .qb-neutre { background: #2a2a3e; color: #c0b090; border-color: #3a3a50; }
  body.dark .covers { border-top-color: #3a3a50; }
  body.dark .cover-card p { color: #b0a080; }
  body.dark .typing-text { color: #9a8a70; }

  /* Mobile */
  @media (max-width: 600px) {
    body { padding: 0.8rem 0.5rem 1rem; }
    #app { gap: 10px; }
    h1 { font-size: 1.2rem; }
    .logo { width: 42px; height: 42px; font-size: 22px; }
    #chat { min-height: 300px; max-height: 55vh; padding: 0.8rem; border-radius: 14px; }
    .bub { max-width: 88%; font-size: 13px; padding: 9px 12px; }
    .av { width: 26px; height: 26px; font-size: 13px; }
    #quick { gap: 5px; }
    .qb { font-size: 11px; padding: 5px 11px; }
    #inp { font-size: 16px; padding: 10px 12px; }
    #sbtn { padding: 10px 16px; font-size: 13px; }
    .cover-card img { width: 60px; height: 88px; }
    .icon-btn { width: 32px; height: 32px; font-size: 14px; }
  }
</style>

const TITLES_SET = new Set(CATALOGUE.split('\n').map(l => l.split('|')[0].trim().toLowerCase()));

const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
let history = [];
let lastSendTime = 0;

// Dark mode
function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.getElementById('darkBtn').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
}
if (localStorage.getItem('darkMode') === '1') {
  document.body.classList.add('dark');
  document.getElementById('darkBtn').textContent = '\u2600\uFE0F';
}

// Clear chat
function clearChat() {
  chat.innerHTML = '';
  history = [];
  addMsg('bot', 'Bonjour cher \u00e9l\u00e8ve de Dupanloup ! \uD83E\uDDED<br><br>Je suis ton <strong>Guide de Lecture</strong>, un biblioth\u00e9caire passionn\u00e9 et cultiv\u00e9. Dis-moi ce que tu aimes \u2014 aventure, frissons, rires, myst\u00e8res \u2014 et je te d\u00e9nicherai <em>le</em> livre qui va te captiver !');
}

// Genre stats
function trackGenre(genre) {
  const stats = JSON.parse(localStorage.getItem('genreStats') || '{}');
  stats[genre] = (stats[genre] || 0) + 1;
  localStorage.setItem('genreStats', JSON.stringify(stats));
}

function addMsg(role, html_content) {
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'bot' ? 'bot' : 'user');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'bot' ? 'bot' : 'usr');
  av.textContent = role === 'bot' ? '📚' : '🧑';
  const bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = html_content;
  d.appendChild(av); d.appendChild(bub);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

async function fetchCover(title) {
  try {
    const resp = await fetch('https://www.googleapis.com/books/v1/volumes?q=intitle:' + encodeURIComponent(title) + '&maxResults=1');
    const data = await resp.json();
    const img = data.items?.[0]?.volumeInfo?.imageLinks?.thumbnail;
    return img ? img.replace('http://', 'https://') : null;
  } catch { return null; }
}

async function addCovers(titles) {
  if (!titles.length) return;
  const results = await Promise.all(titles.map(async t => ({ title: t, url: await fetchCover(t) })));
  const found = results.filter(r => r.url);
  if (!found.length) return;
  const lastBub = chat.querySelectorAll('.msg.bot .bub');
  const bub = lastBub[lastBub.length - 1];
  if (!bub) return;
  const div = document.createElement('div');
  div.className = 'covers';
  found.forEach(r => {
    const card = document.createElement('div');
    card.className = 'cover-card';
    card.innerHTML = '<img src="' + r.url + '" alt="' + r.title + '" loading="lazy"><p>' + r.title + '</p>';
    div.appendChild(card);
  });
  bub.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typ';
  d.innerHTML = '<div class="av bot">📚</div><div class="bub"><div class="typing"><span></span><span></span><span></span><span class="typing-text">Le Guide cherche dans ses rayons\u2026</span></div></div>';
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}

addMsg('bot', 'Bonjour cher &eacute;l&egrave;ve de Dupanloup ! 🧭<br><br>Je suis ton <strong>Guide de Lecture</strong>, un biblioth&eacute;caire passionn&eacute; et cultiv&eacute;. Dis-moi ce que tu aimes &mdash; aventure, frissons, rires, myst&egrave;res &mdash; et je te d&eacute;nicherai <em>le</em> livre qui va te captiver !');

async function send() {
  const txt = inp.value.trim();
  if (!txt) return;
  const now = Date.now();
  if (now - lastSendTime < 3000) { inp.value = ''; return; }
  lastSendTime = now;
  inp.value = '';
  addMsg('user', txt);
  history.push({ role: 'user', content: txt });
  sbtn.disabled = true;
  addTyping();

  const system = `Tu es le Guide de Lecture de Dupanloup, un bibliothécaire passionné, français et extrêmement cultivé. Ton but n'est pas juste de donner une cote, mais de transmettre l'amour de la lecture.

Voici le catalogue COMPLET des livres disponibles au CDI (format: Titre | Auteur | Cote) :
${CATALOGUE}

RÈGLES :
- Recommande EXCLUSIVEMENT des livres présents dans le catalogue ci-dessus, en privilégiant les livres en français.
- Propose 1 à 3 livres par réponse.
- SOIS LOQUACE : Pour chaque livre, ne te contente pas d'un résumé. Décris l'ambiance du livre (est-ce sombre, héroïque, drôle, mystérieux ?), parle des émotions que l'élève va ressentir.
- ARGUMENTE : Explique précisément pourquoi ce livre correspond à la demande. "Si tu aimes l'aventure, ce livre va te transporter parce que..."
- FORMATAGE : Utilise le gras (**titre**) pour les titres et indique la [Cote] entre crochets.
- Si un livre demandé est absent du catalogue, dis-le honnêtement et propose une alternative du catalogue.
- Termine toujours en ouvrant la discussion : "Est-ce que l'un de ces univers te tente, ou veux-tu que je cherche quelque chose de plus précis ?"
- TON : Chaleureux, littéraire, entraînant et complice. Utilise un vocabulaire riche mais accessible pour des collégiens (11-15 ans).
- Réponds toujours en français.`;

  const payload = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 1000,
    system: [{ type: 'text', text: system, cache_control: { type: 'ephemeral' } }],
    messages: history.slice(-12)
  };

  try {
    let resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (resp.status === 429) {
      await new Promise(r => setTimeout(r, 2000));
      resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
    const data = await resp.json();
    if (data.error) {
      document.getElementById('typ')?.remove();
      addMsg('bot', "Désolé, il y a eu un souci technique. Réessaie dans un instant !");
      console.error('API error:', data.error);
      sbtn.disabled = false;
      inp.focus();
      return;
    }
    const reply = data.content?.[0]?.text || "Oups, une erreur s'est produite. Réessaie !";
    document.getElementById('typ')?.remove();
    addMsg('bot', fmt(reply));
    history.push({ role: 'assistant', content: reply });
    const titles = [...reply.matchAll(/\*\*(.*?)\*\*/g)].map(m => m[1]).filter(t => TITLES_SET.has(t.toLowerCase()));
    addCovers(titles);
  } catch(e) {
    document.getElementById('typ')?.remove();
    addMsg('bot', "Erreur de connexion. Réessaie dans un instant !");
  }
  sbtn.disabled = false;
  inp.focus();
}

function qa(q) { trackGenre(q); inp.value = q; send(); }
</script>
